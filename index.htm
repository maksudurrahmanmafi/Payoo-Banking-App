<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payooo</title>
    <link rel="shortcut icon" href="payoo.png" type="image/x-icon" />
    <!-- Daisy UI CDN-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


  </head>
  <body class="bg-[#D9D9D9] h-[100vh] flex flex-col justify-center items-center">
    <div class=" h-[130px] w-[300px] bg-[url('/assets/bg.png')] bg-cover flex justify-center items-center">
        <img src="../assets/Group.png" alt="">

    </div>
   <div >
  <form class="bg-white w-full max-w-md rounded-3xl shadow-xl p-8">

    <h2 class="text-3xl font-bold text-center mb-2">
      Welcome Back 👋
    </h2>

    <p class="text-center text-gray-500 mb-8">
      Login to your Payoo account
    </p>

    <!-- Mobile Number -->
    <div class="mb-5">
      <label class="font-semibold text-gray-700">
        Mobile Number
      </label>

    <input
  type="text" id="mobile-number"
  class="input input-bordered w-full mt-2 rounded-xl focus:outline-none focus:ring-0 focus:shadow-none"
/>
    </div>

    <!-- PIN -->
    <div class="mb-6">
      <label class="font-semibold text-gray-700">
        4 Digit PIN
      </label>

      <input
        type="password" id="pin"
        maxlength="4"
        placeholder="••••"
        class="input input-bordered w-full mt-2 rounded-xl focus:outline-none focus:ring-0 focus:shadow-none"
      />
    </div>

    <!-- Button -->
    <button id="login"
      class="btn w-full bg-[#0874F2] hover:bg-blue-700 text-white rounded-xl border-none text-lg"
    >
      Login
    </button>

    <!-- Footer -->
  <!--   <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="#" class="text-blue-600 font-semibold">
        Register
      </a>
    </p> -->

  </form>
</div>

<!-- script tags start here  -->
 <script src="script.js"></script>
  </body>
</html>
